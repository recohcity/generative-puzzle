name: Code Quality Check

env:
  QUALITY_ENV: production

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for better analysis
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run TypeScript compilation check
      run: npx tsc --noEmit --skipLibCheck
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Run unit tests with coverage
      run: npm run test:unit -- --coverage --coverageReporters=json --coverageReporters=lcov
    
    - name: Run reducer purity check
      run: npm run quality:reducer-purity

    - name: Run production exposure scan
      run: npm run quality:exposure-scan

    - name: Run SSR boundary scan
      run: npm run quality:ssr-scan

    - name: Run docs consistency check
      run: npm run quality:docs-consistency

    - name: Run project quality check
      run: npm run quality:check

    - name: Run production guard E2E check
      run: npm run test:prod-guard
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Generate quality report
      if: always()
      run: |
        mkdir -p quality-reports
        if npm run quality:report > quality-reports/quality-report.txt 2>&1; then
          echo "quality report generated"
        else
          echo "quality report generation failed (non-blocking informational step)" >> quality-reports/quality-report.txt
        fi
    
    - name: Upload quality reports
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports-${{ matrix.node-version }}
        path: quality-reports/
        retention-days: 7
    
    - name: Comment PR with quality results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let comment = '## 🔍 Code Quality Report\n\n';
          
          try {
            // Read quality reports if they exist
            if (fs.existsSync('quality-reports/quality-report.txt')) {
              const qualityReport = fs.readFileSync('quality-reports/quality-report.txt', 'utf8');
              const lines = qualityReport.split('\n');
              const summaryLines = lines.filter(line => 
                line.includes('总体评分:') || 
                line.includes('总体状态:') ||
                line.includes('TypeScript:') ||
                line.includes('ESLint:') ||
                line.includes('测试覆盖率:')
              );
              
              if (summaryLines.length > 0) {
                comment += '### 质量检查结果\n';
                summaryLines.forEach(line => {
                  comment += `- ${line.trim()}\n`;
                });
                comment += '\n';
              }
            }
            
            // Add coverage information
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;
              
              comment += '### Test Coverage\n';
              comment += `- **Lines**: ${total.lines.pct}%\n`;
              comment += `- **Functions**: ${total.functions.pct}%\n`;
              comment += `- **Branches**: ${total.branches.pct}%\n`;
              comment += `- **Statements**: ${total.statements.pct}%\n\n`;
            }
            
            comment += '### Actions Taken\n';
            comment += '- ✅ TypeScript compilation check\n';
            comment += '- ✅ ESLint code quality check\n';
            comment += '- ✅ Unit tests with coverage\n';
            comment += '- ✅ Quality detection analysis\n';
            comment += '- ✅ Advanced quality metrics\n\n';
            
            comment += '_This report was automatically generated by the Quality Check workflow._';
            
          } catch (error) {
            comment += '⚠️ Unable to generate detailed quality report. Please check the workflow logs.\n\n';
            comment += `Error: ${error.message}`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  quality-gate:
    runs-on: ubuntu-latest
    needs: quality-check
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run quality gate check
      run: |
        echo "🚪 Running Quality Gate Check..."
        
        # Run quality check and capture output
        npm run quality:check > quality-output.txt 2>&1
        
        # Extract quality score
        QUALITY_SCORE=$(grep -o "总体评分: [0-9.]*" quality-output.txt | grep -o "[0-9.]*" | head -1)
        
        echo "Quality Score: $QUALITY_SCORE"
        
        # Use configured quality gate threshold
        QUALITY_THRESHOLD=$(node -e "const c=require('./quality-gate.config.cjs');const env=process.env.QUALITY_ENV||'production';const base=c.qualityGate?.minimumScore??70;const ov=c.environments?.[env]?.qualityGate?.minimumScore;process.stdout.write(String(ov??base));")
        
        if [ -z "$QUALITY_SCORE" ]; then
          echo "❌ Could not determine quality score"
          exit 1
        fi
        
        # Compare scores (using bc for floating point comparison)
        if (( $(echo "$QUALITY_SCORE >= $QUALITY_THRESHOLD" | bc -l) )); then
          echo "✅ Quality gate passed! Score: $QUALITY_SCORE >= $QUALITY_THRESHOLD"
          echo "QUALITY_GATE_STATUS=passed" >> $GITHUB_ENV
        else
          echo "❌ Quality gate failed! Score: $QUALITY_SCORE < $QUALITY_THRESHOLD"
          echo "QUALITY_GATE_STATUS=failed" >> $GITHUB_ENV
          
          echo "::error::Quality gate threshold not met. Current: $QUALITY_SCORE, Required: $QUALITY_THRESHOLD"
          exit 1
        fi
    
    - name: Update commit status
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const status = process.env.QUALITY_GATE_STATUS === 'passed' ? 'success' : 'failure';
          const description = process.env.QUALITY_GATE_STATUS === 'passed' 
            ? 'Quality gate passed' 
            : 'Quality gate failed - review required';
          
          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.payload.pull_request.head.sha,
            state: status,
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            description: description,
            context: 'quality-gate'
          });