name: 🚀 Deploy Standalone to GitHub Pages

on:
  push:
    branches: [ game-only ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Static (Zero-Cloud)
        run: npm run build
        env:
          BUILD_STATIC: 'true'
          # In game-only branch, we don't need cloud envs, but Next.js might want placeholders
          NEXT_PUBLIC_SUPABASE_URL: "https://nowhere.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "no-key"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
